<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.com" >
<head>
    <div th:replace="~{fragments :: header_links}"></div>
    <title>Book Store</title>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div class="container my-5 p-5" style="border: 1px solid black">
    <h4 class="text-center">Register New Books</h4>

    <form th:action="@{/save}" method="post" th:object="${book}" class="col-md-4 offset-md-4">

        <div class="mb-3">
            <label class="form-label">Book Name</label>
            <input type="text" class="form-control" th:field="*{title}">

            <p class="text-danger" th:if="${#fields.hasErrors('title')}"
               th:errors="*{title}"></p>
        </div>

        <div class="mb-3">
            <label class="form-label">Author</label>
            <input type="text" class="form-control" th:field="*{author}">

            <p class="text-danger" th:if="${#fields.hasErrors('author')}"
               th:errors="*{author}"></p>
        </div>
        <div class="mb-3">
            <label class="form-label">Genre</label>
            <select class="form-select" th:field="*{genre}">
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Tech">Tech</option>
                <option value="Fantasy">Fantasy</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Price</label>
            <input type="text" class="form-control" th:field="*{price}">

            <p class="text-danger" th:if="${#fields.hasErrors('price')}"
               th:errors="*{price}"></p>
        </div>

        <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input type="text" class="form-control" th:field="*{imageUrl}">
        </div>


        <center>
            <button type="submit" class="btn btn-primary">Submit</button>
        </center>

    </form>
</div>




<div th:replace="~{fragments :: scripts}"></div>

</body>
</html>
